name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install libusb
        run: brew install libusb
      - name: Build (arm64)
        run: |
          CGO_ENABLED=1 GOARCH=arm64 go build -o mi-tienda-print-mac-arm64 .
      - name: Build (amd64)
        run: |
          CGO_ENABLED=1 GOARCH=amd64 go build -o mi-tienda-print-mac-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: mi-tienda-print-mac-*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install libusb
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev
      - name: Build
        run: |
          CGO_ENABLED=1 go build -o mi-tienda-print-linux .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: mi-tienda-print-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install libusb via vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install libusb:x64-windows-static
      - name: Build
        env:
          CGO_ENABLED: 1
          PKG_CONFIG_PATH: ${{ github.workspace }}\vcpkg\installed\x64-windows-static\lib\pkgconfig
        run: |
          go build -o mi-tienda-print.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: mi-tienda-print.exe

  release:
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-binaries/mi-tienda-print-mac-arm64
            mac-binaries/mi-tienda-print-mac-amd64
            linux-binary/mi-tienda-print-linux
            windows-binary/mi-tienda-print.exe
          generate_release_notes: true
